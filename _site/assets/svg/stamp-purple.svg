<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Grow · Serve · Share">
  <title>Grow · Serve · Share</title>

  <!-- Outer dashed ring — matches logo purple -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#3D2A6B" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#3D2A6B" stroke-width="1"/>

  <!-- Circular text path -->
  <defs>
    <path id="topArcP" d="M 18,100 A 82,82 0 1,1 182,100"/>
  </defs>

  <text font-family="'Playfair Display', Georgia, serif" font-size="17" fill="#3D2A6B" letter-spacing="3">
    <textPath href="#topArcP" startOffset="8%">GROW · SERVE · SHARE · </textPath>
  </text>

  <!-- Centre mark -->
  <text x="100" y="110" text-anchor="middle" font-size="38" fill="#1a4b7a" font-family="serif">✦</text>

</svg>
