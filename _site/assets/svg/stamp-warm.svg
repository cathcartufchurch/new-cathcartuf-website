<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Grow · Serve · Share">
  <title>Grow · Serve · Share</title>

  <!-- Outer dashed ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#D4956A" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#D4956A" stroke-width="1"/>

  <!-- Circular text path — text runs along the top arc -->
  <defs>
    <path id="topArc" d="M 18,100 A 82,82 0 1,1 182,100"/>
    <path id="bottomArc" d="M 22,108 A 78,78 0 0,0 178,108"/>
  </defs>

  <text font-family="'Playfair Display', Georgia, serif" font-size="17" fill="#D4956A" letter-spacing="3">
    <textPath href="#topArc" startOffset="8%">GROW · SERVE · SHARE · </textPath>
  </text>

  <!-- Small cross/dove centre mark -->
  <text x="100" y="110" text-anchor="middle" font-size="38" fill="#6B3A28" font-family="serif">✦</text>

</svg>
